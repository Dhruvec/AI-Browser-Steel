<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEEL Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            background: #000;
            color: #f8fbff;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            display: block;
            background: #000;
        }

        .home-shell {
            width: 100%;
            min-height: max-content;
        }

        .hero-scene {
            width: min(92vw, 920px);
            min-height: 100vh;
            margin: 0 auto;
            padding: 24px 0 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }

        .hero-container {
            width: min(96vw, 1100px);
            height: clamp(280px, 52vh, 520px);
            position: relative;
            display: grid;
            place-items: center;
        }

        .hero-container::after {
            content: "";
            position: absolute;
            z-index: 2;
            width: clamp(260px, 34vw, 420px);
            height: clamp(260px, 34vw, 420px);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.72) 0%, rgba(0, 0, 0, 0.5) 54%, transparent 72%);
            pointer-events: none;
        }

        .steel-text {
            position: absolute;
            z-index: 1;
            margin: 0;
            width: 100%;
            font-family: "Brush Script MT", "Segoe Script", "Lucida Handwriting", cursive;
            font-size: clamp(8rem, 28vw, 21rem);
            line-height: 0.8;
            font-weight: 400;
            letter-spacing: -0.04em;
            text-align: center;
            background: linear-gradient(180deg, #ffffff 0%, #d8d8d8 48%, #5f5f5f 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0.92;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.18));
            text-shadow: 0 0 1px rgba(255, 255, 255, 0.7);
            pointer-events: none;
            user-select: none;
        }

        #sphere-container {
            width: clamp(230px, 30vw, 360px);
            height: clamp(230px, 30vw, 360px);
            position: relative;
            z-index: 3;
            cursor: grab;
        }

        #sphere-container:active {
            cursor: grabbing;
        }

        #orbCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .subtitle {
            margin: 0;
            color: #8f8f8f;
            font-size: 0.82rem;
            letter-spacing: 0.34em;
            text-transform: uppercase;
        }

        .search-container {
            width: min(92vw, 640px);
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 4.6rem 1rem 1.4rem;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            outline: none;
            color: #f8fbff;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            font-size: 1rem;
        }

        .search-input:focus {
            border-color: rgba(255, 255, 255, 0.44);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.08);
        }

        .mic-icon,
        .search-icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #8d8d8d;
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .mic-icon {
            right: 3.7rem;
        }

        .search-icon {
            right: 1.4rem;
        }

        .mic-icon:hover,
        .search-icon:hover {
            color: #ffffff;
            transform: translateY(-50%) scale(1.08);
        }

        .recording {
            color: #ffffff !important;
            animation: pulse-red 1s infinite alternate;
        }

        .news-panel {
            width: min(92vw, 920px);
            margin: 0 auto 120px;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.045);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .news-heading {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .news-heading h2 {
            margin: 0;
            font-size: clamp(1.45rem, 3vw, 2.2rem);
            letter-spacing: -0.04em;
        }

        .news-heading p {
            margin: 6px 0 0;
            color: #8f8f8f;
            max-width: 480px;
            line-height: 1.55;
        }

        .news-status {
            color: #9f9f9f;
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .news-ticker {
            position: relative;
            overflow: hidden;
            margin: 0 -22px;
            padding: 4px 0 8px;
        }

        .news-ticker::before,
        .news-ticker::after {
            content: "";
            position: absolute;
            top: 0;
            z-index: 3;
            width: 86px;
            height: 100%;
            pointer-events: none;
        }

        .news-ticker::before {
            left: 0;
            background: linear-gradient(90deg, rgba(12, 12, 12, 0.96), transparent);
        }

        .news-ticker::after {
            right: 0;
            background: linear-gradient(270deg, rgba(12, 12, 12, 0.96), transparent);
        }

        .news-track {
            display: flex;
            width: max-content;
            gap: 14px;
            padding: 0 22px;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            will-change: transform;
        }

        .news-arrow {
            position: absolute;
            top: 50%;
            z-index: 5;
            display: grid;
            width: 46px;
            height: 46px;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.78);
            color: #fff;
            cursor: pointer;
            font-size: 1.7rem;
            line-height: 1;
            transform: translateY(-50%);
            transition: border-color 0.2s ease, background 0.2s ease, scale 0.2s ease;
        }

        .news-arrow:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.16);
            scale: 1.08;
        }

        .news-arrow-left {
            left: 18px;
        }

        .news-arrow-right {
            right: 18px;
        }

        .news-card {
            display: flex;
            width: clamp(260px, 32vw, 360px);
            min-height: 248px;
            flex: 0 0 auto;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            background: rgba(0, 0, 0, 0.62);
            color: inherit;
            text-decoration: none;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .news-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.28);
            background: rgba(255, 255, 255, 0.08);
        }

        .news-image {
            width: 100%;
            height: 128px;
            object-fit: cover;
            background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.26), transparent 32%),
                linear-gradient(135deg, #151515, #050505);
        }

        .news-body {
            display: flex;
            flex: 1;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
        }

        .news-topic {
            color: #9f9f9f;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .news-card h3 {
            display: -webkit-box;
            min-height: 2.5em;
            margin: 12px 0 8px;
            overflow: hidden;
            font-size: 1rem;
            line-height: 1.25;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }

        .news-card p {
            display: -webkit-box;
            margin: 0;
            overflow: hidden;
            color: #9a9a9a;
            font-size: 0.84rem;
            line-height: 1.45;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }

        .news-source {
            margin-top: 16px;
            color: #d8d8d8;
            font-size: 0.76rem;
            font-weight: 700;
        }

        .scroll-hint {
            color: #7c7c7c;
            font-size: 0.76rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        .scroll-hint::after {
            content: "";
            display: block;
            width: 1px;
            height: 30px;
            margin: 10px auto 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.65), transparent);
        }

        @keyframes pulse-red {
            from {
                opacity: 0.65;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 760px) {
            .hero-container {
                width: 96vw;
                height: clamp(280px, 52vh, 420px);
            }

            .steel-text {
                font-size: clamp(6rem, 34vw, 10rem);
            }

            .news-heading {
                align-items: flex-start;
                flex-direction: column;
            }

            .news-status {
                white-space: normal;
            }

            .news-card {
                width: 78vw;
            }

            .hero-container::after,
            #sphere-container {
                width: clamp(220px, 68vw, 320px);
                height: clamp(220px, 68vw, 320px);
            }
        }
    </style>
</head>

<body>
    <main class="home-shell">
        <section class="hero-scene" aria-label="STEEL browser first scene">
            <section class="hero-container" aria-label="STEEL browser home">
                <h1 class="steel-text">STEEL</h1>
                <div id="sphere-container" aria-label="Drifting 3D grid orb"></div>
            </section>

            <p class="subtitle">Next Gen AI Browser</p>

            <div class="search-container">
                <input type="text" id="homeSearch" class="search-input" placeholder="Search the web or enter URL..."
                    onkeydown="if(event.key === 'Enter') handleSearch()" autofocus autocomplete="off">
                <svg id="micBtn" class="mic-icon h-7 w-7" onclick="toggleVoiceSearch()" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <svg class="search-icon h-6 w-6" onclick="handleSearch()" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>

            <p class="scroll-hint">Scroll for latest information</p>
        </section>

        <section class="news-panel" aria-label="Latest news with sources">
            <div class="news-heading">
                <div>
                    <h2>Latest News</h2>
                    <p>Live technology headlines with images, source links, and hyper horizontal scrolling.</p>
                </div>
                <span id="newsStatus" class="news-status">Loading live feed</span>
            </div>

            <div class="news-ticker" aria-live="polite">
                <button class="news-arrow news-arrow-left" type="button" aria-label="Scroll news left"
                    data-scroll-direction="left">‹</button>
                <div id="newsTrack" class="news-track"></div>
                <button class="news-arrow news-arrow-right" type="button" aria-label="Scroll news right"
                    data-scroll-direction="right">›</button>
            </div>
        </section>

    </main>

    <script src="scripts/orb3dViewer.js"></script>
    <script>
        let newsScrollPosition = 0;
        let newsScrollDirection = 0;
        let newsAnimationFrame = null;
        let newsLastFrameTime = 0;
        const newsScrollSpeed = 420;

        window.addEventListener("load", () => {
            initORB3D("sphere-container");
            setupNewsControls();
            loadLatestNews();
        });

        const newsImageBank = [
            "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=720&q=80",
            "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=720&q=80",
            "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=720&q=80",
            "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&w=720&q=80",
            "https://images.unsplash.com/photo-1495020689067-958852a7765e?auto=format&fit=crop&w=720&q=80"
        ];

        const fallbackNews = [
            {
                title: "OpenAI launches new model",
                description: "Follow the latest AI model launches, developer tools, and platform updates.",
                url: "https://news.google.com/search?q=OpenAI%20launches%20new%20model",
                image: newsImageBank[0],
                source: "Google News",
                category: "Technology"
            },
            {
                title: "Apple announces AI features",
                description: "Track new on-device AI features, product integrations, and software releases.",
                url: "https://news.google.com/search?q=Apple%20announces%20AI%20features",
                image: newsImageBank[1],
                source: "Google News",
                category: "Technology"
            },
            {
                title: "Nvidia stock hits record high",
                description: "Watch AI chip demand, market momentum, and semiconductor stock coverage.",
                url: "https://news.google.com/search?q=Nvidia%20stock%20hits%20record%20high",
                image: newsImageBank[2],
                source: "Google News",
                category: "Technology"
            },
            {
                title: "AI chips power the next device wave",
                description: "New processors are bringing faster local AI features to laptops and phones.",
                url: "https://news.google.com/search?q=AI%20chips%20latest%20technology",
                image: newsImageBank[3],
                source: "Google News",
                category: "Technology"
            }
        ];

        function escapeHtml(value) {
            const entities = {
                "&": String.fromCharCode(38, 97, 109, 112, 59),
                "<": String.fromCharCode(38, 108, 116, 59),
                ">": String.fromCharCode(38, 103, 116, 59),
                "'": String.fromCharCode(38, 35, 51, 57, 59)
            };
            entities[String.fromCharCode(34)] = String.fromCharCode(38, 113, 117, 111, 116, 59);
            return String(value || "").replace(/[&<>'"]/g, (char) => entities[char]);
        }

        function setupNewsControls() {
            document.querySelectorAll("[data-scroll-direction]").forEach((button) => {
                button.addEventListener("mouseenter", () => {
                    newsScrollDirection = button.dataset.scrollDirection === "right" ? -1 : 1;
                    startNewsScroll();
                });
                button.addEventListener("mouseleave", stopNewsScroll);
                button.addEventListener("focus", () => {
                    newsScrollDirection = button.dataset.scrollDirection === "right" ? -1 : 1;
                    startNewsScroll();
                });
                button.addEventListener("blur", stopNewsScroll);
            });
        }

        function startNewsScroll() {
            if (newsAnimationFrame) return;
            newsLastFrameTime = performance.now();
            const step = (currentTime) => {
                const track = document.getElementById("newsTrack");
                const maxOffset = track.scrollWidth / 2;
                const deltaSeconds = Math.min((currentTime - newsLastFrameTime) / 1000, 0.033);
                newsLastFrameTime = currentTime;

                if (maxOffset > 0) {
                    newsScrollPosition += newsScrollDirection * newsScrollSpeed * deltaSeconds;
                    if (newsScrollPosition <= -maxOffset) newsScrollPosition += maxOffset;
                    if (newsScrollPosition >= 0) newsScrollPosition -= maxOffset;
                    track.style.transform = `translate3d(${newsScrollPosition}px, 0, 0)`;
                }
                newsAnimationFrame = requestAnimationFrame(step);
            };
            newsAnimationFrame = requestAnimationFrame(step);
        }

        function stopNewsScroll() {
            cancelAnimationFrame(newsAnimationFrame);
            newsAnimationFrame = null;
            newsLastFrameTime = 0;
            newsScrollDirection = 0;
        }

        function renderNews(articles) {
            const track = document.getElementById("newsTrack");
            const safeArticles = articles.length ? articles : fallbackNews;
            const loopArticles = [...safeArticles, ...safeArticles];
            newsScrollPosition = 0;
            track.style.transform = "translate3d(0, 0, 0)";

            track.innerHTML = loopArticles.map((article, index) => {
                const image = article.image || newsImageBank[index % newsImageBank.length];
                return `
                    <a class="news-card" href="${escapeHtml(article.url)}" target="_self">
                        <img class="news-image" src="${escapeHtml(image)}" alt="" loading="lazy" onerror="this.style.display='none'">
                        <div class="news-body">
                            <div>
                                <span class="news-topic">${escapeHtml(article.category || "Technology")}</span>
                                <h3>${escapeHtml(article.title)}</h3>
                                <p>${escapeHtml(article.description || "Open this story for the full update.")}</p>
                            </div>
                            <span class="news-source">Source: ${escapeHtml(article.source || "Live News")}</span>
                        </div>
                    </a>`;
            }).join("");
        }

        async function loadLatestNews() {
            const status = document.getElementById("newsStatus");
            try {
                const response = await fetch("http://127.0.0.1:8000/news");
                if (!response.ok) throw new Error("News feed unavailable");
                const data = await response.json();
                renderNews(data.articles || []);
                status.textContent = data.provider === "fallback" ? "Demo feed" : `Live via ${data.provider}`;
            } catch (error) {
                renderNews(fallbackNews);
                status.textContent = "Demo feed";
            }
        }

        function handleSearch() {
            let url = document.getElementById("homeSearch").value.trim();
            if (!url) return;

            if (!url.startsWith("http") && !url.startsWith("file://")) {
                if (url.includes(" ")) {
                    url = "https://www.google.com/search?q=" + encodeURIComponent(url);
                } else if (!url.includes(".") && !url.startsWith("localhost")) {
                    url = "https://" + url + ".com";
                } else {
                    url = "https://" + url;
                }
            }
            window.location.href = url;
        }

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        async function toggleVoiceSearch() {
            const micBtn = document.getElementById("micBtn");
            const searchInput = document.getElementById("homeSearch");

            if (isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove("recording");
                searchInput.placeholder = "Processing voice...";
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async function () {
                        const base64data = reader.result.split(",")[1];
                        try {
                            const response = await fetch("http://127.0.0.1:8000/transcribe", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ base64_audio: base64data })
                            });
                            const data = await response.json();
                            if (data.text) {
                                searchInput.value = data.text;
                                handleSearch();
                            } else {
                                searchInput.placeholder = "Could not transcribe audio.";
                            }
                        } catch (e) {
                            searchInput.placeholder = "Error connecting to AI Server.";
                        }
                    };
                };

                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add("recording");
                searchInput.value = "";
                searchInput.placeholder = "Listening... Click mic again to stop.";
            } catch (err) {
                searchInput.placeholder = "Microphone access denied.";
            }
        }
    </script>
</body>

</html>
