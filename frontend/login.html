<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEEL Login</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #000000;
            --panel: rgba(8, 8, 8, 0.88);
            --border: rgba(255, 255, 255, 0.12);
            --text: #f7f7f7;
            --muted: #9a9a9a;
            --blue: #ffffff;
            --blue-strong: #cfcfcf;
            --success: #d9d9d9;
            --danger: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #000000;
        }

        .auth-shell {
            width: min(100%, 880px);
            display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            gap: 16px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.92);
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .brand-panel,
        .form-panel {
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .brand-panel {
            min-height: 520px;
            padding: 34px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand-mark {
            margin: 0;
            font-size: clamp(3rem, 7vw, 5.8rem);
            line-height: 0.9;
            font-weight: 900;
            letter-spacing: 0.16em;
            background: linear-gradient(180deg, #ffffff, #d7d7d7 58%, #656565);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand-copy h2 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.02;
            letter-spacing: -0.05em;
        }

        .brand-copy p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .status-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 28px;
        }

        .status-pill {
            padding: 9px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.055);
            color: var(--muted);
            font-size: 0.82rem;
        }

        .form-panel {
            padding: 36px;
            display: flex;
            align-items: center;
        }

        .form-inner {
            width: 100%;
        }

        .form-header {
            margin-bottom: 24px;
        }

        .form-header h1 {
            margin: 0 0 8px;
            font-size: 2.1rem;
            letter-spacing: -0.04em;
        }

        .form-header p {
            margin: 0;
            color: var(--muted);
        }

        .mode-switch {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 6px;
            margin-bottom: 22px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.2);
        }

        .mode-switch button {
            border: 0;
            border-radius: 999px;
            padding: 12px 16px;
            color: var(--muted);
            background: transparent;
            cursor: pointer;
            font-weight: 700;
        }

        .mode-switch button.active {
            color: white;
            background: linear-gradient(135deg, #f5f5f5, #9f9f9f);
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #e6e6e6;
            font-size: 0.88rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 15px;
            color: var(--text);
            background: rgba(0, 0, 0, 0.72);
            outline: none;
            font-size: 1rem;
        }

        input:focus {
            border-color: rgba(255, 255, 255, 0.44);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.08);
        }

        input::placeholder {
            color: #6f7f96;
        }

        .submit-btn {
            width: 100%;
            border: 0;
            border-radius: 16px;
            padding: 14px 18px;
            margin-top: 8px;
            color: white;
            background: linear-gradient(135deg, #f5f5f5, #9f9f9f);
            cursor: pointer;
            font-weight: 800;
            font-size: 1rem;
        }

        .submit-btn:disabled {
            cursor: wait;
            opacity: 0.7;
        }

        .message {
            min-height: 24px;
            margin-top: 16px;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .message.error {
            color: var(--danger);
        }

        .message.success {
            color: var(--success);
        }

        .fine-print {
            margin-top: 16px;
            color: var(--muted);
            font-size: 0.8rem;
            line-height: 1.6;
        }

        @media (max-width: 820px) {
            .auth-shell {
                grid-template-columns: 1fr;
            }

            .brand-panel {
                min-height: 320px;
            }
        }
    </style>
</head>

<body>
    <main class="auth-shell">
        <section class="brand-panel">
            <h1 class="brand-mark">STEEL</h1>
            <div class="brand-copy">
                <h2>Secure AI browser access.</h2>
                <p>Sign up to save your account locally. Log in to open the browser.</p>
                <div class="status-row">
                    <span class="status-pill">Local auth</span>
                    <span class="status-pill">Minimal glass UI</span>
                </div>
            </div>
        </section>

        <section class="form-panel">
            <div class="form-inner">
                <div class="form-header">
                    <h1 id="authTitle">Welcome back</h1>
                    <p id="authSubtitle">Sign in to continue.</p>
                </div>

                <div class="mode-switch" role="tablist" aria-label="Authentication mode">
                    <button id="loginModeBtn" class="active" type="button">Login</button>
                    <button id="signupModeBtn" type="button">Signup</button>
                </div>

                <form id="authForm" autocomplete="on">
                    <div class="field">
                        <label for="username">Username</label>
                        <input id="username" name="username" type="text" placeholder="steel_user" required minlength="3"
                            maxlength="32" autocomplete="username">
                    </div>

                    <div class="field" id="emailField" hidden>
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email">
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" placeholder="Enter your password" required
                            minlength="8" autocomplete="current-password">
                    </div>

                    <button id="submitBtn" class="submit-btn" type="submit">Login</button>
                </form>

                <div id="message" class="message" role="status" aria-live="polite"></div>
                <div class="fine-print">Signup stores your account. Login starts the browser session.</div>
            </div>
        </section>
    </main>

    <script src="scripts/auth.js"></script>
    <script>
        let authMode = "login";

        const authForm = document.getElementById("authForm");
        const authTitle = document.getElementById("authTitle");
        const authSubtitle = document.getElementById("authSubtitle");
        const submitBtn = document.getElementById("submitBtn");
        const messageEl = document.getElementById("message");
        const emailField = document.getElementById("emailField");
        const emailInput = document.getElementById("email");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const loginModeBtn = document.getElementById("loginModeBtn");
        const signupModeBtn = document.getElementById("signupModeBtn");

        function showMessage(text, type = "") {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`.trim();
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitBtn.textContent = isLoading ? "Please wait..." : (authMode === "login" ? "Login" : "Create account");
        }

        function setAuthMode(mode) {
            authMode = mode;
            loginModeBtn.classList.toggle("active", mode === "login");
            signupModeBtn.classList.toggle("active", mode === "signup");
            emailField.hidden = mode !== "signup";
            emailInput.required = mode === "signup";
            passwordInput.autocomplete = mode === "signup" ? "new-password" : "current-password";
            authTitle.textContent = mode === "login" ? "Welcome back" : "Create account";
            authSubtitle.textContent = mode === "login" ? "Sign in to continue." : "Create a local account.";
            usernameInput.value = "";
            emailInput.value = "";
            passwordInput.value = "";
            showMessage("");
        }

        loginModeBtn.addEventListener("click", () => setAuthMode("login"));
        signupModeBtn.addEventListener("click", () => setAuthMode("signup"));

        authForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            showMessage("");

            if (authMode === "signup" && passwordInput.value.length < 8) {
                showMessage("Password must be at least 8 characters.", "error");
                return;
            }

            const payload = {
                username: usernameInput.value.trim(),
                password: passwordInput.value
            };

            if (authMode === "signup") {
                payload.email = emailInput.value.trim();
            }

            setLoading(true);

            try {
                const endpoint = authMode === "signup" ? "/signup" : "/login";
                const data = await apiFetch(endpoint, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                if (authMode === "signup") {
                    showMessage(data.message || "Signup successful. Please log in to continue.", "success");
                    setAuthMode("login");
                    usernameInput.value = payload.username;
                    passwordInput.focus();
                    return;
                }

                setAuthState(data.token, data.user);
                showMessage(data.message || "Login successful.", "success");
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 350);
            } catch (error) {
                showMessage(error.message || "Could not connect to the AI engine.", "error");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
